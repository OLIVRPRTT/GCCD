<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Genesys Composable Desktop - Demo</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 20px;
      }
      .controls {
        margin-bottom: 20px;
        padding: 15px;
        background: #f5f5f5;
        border-radius: 5px;
      }
      .gadgets {
        display: flex;
        gap: 20px;
        margin-top: 20px;
      }
      .gadget-container {
        flex: 1;
        border: 2px solid #ddd;
        border-radius: 5px;
        padding: 10px;
      }
      .gadget-container h3 {
        margin-top: 0;
        text-align: center;
      }
      .scope-info {
        font-size: 12px;
        color: #666;
        margin-bottom: 10px;
        text-align: center;
      }
      button {
        margin: 5px;
        padding: 8px 12px;
      }
      .default {
        border-color: #4caf50;
      }
      .embedded {
        border-color: #2196f3;
      }
      input {
        min-width: 300px;
      }
    </style>
  </head>
  <body>
    <h1>Genesys Composable Desktop - Demo</h1>

    <div class="controls">
      <h3>Interaction Controls</h3>
      <div>
        <label>Interaction ID: </label>
        <input type="text" id="interactionId" value="" />
      </div>
      <button onclick="setInteraction('default', null)">Send to Default</button>
      <button onclick="setInteraction('embedded', 'scope-1')">
        Send to Embedded (scope-1)
      </button>
      <button onclick="setInteraction('embedded', 'scope-2')">
        Send to Embedded (scope-2)
      </button>
    </div>

    <iframe
      id="broker"
      src="https://apps.mypurecloud.de/crm-embeddable-desktop/index.html"
      style="display: none"
    ></iframe>

    <div class="gadgets">
      <div class="gadget-container default">
        <h3>Copilot</h3>
        <div class="scope-info">scope: "default"</div>
        <iframe
          src="https://apps.mypurecloud.de/crm-embeddable-desktop/component.html#/copilot?size=small&scope=default"
          width="100%"
          height="400"
        ></iframe>
      </div>

      <div class="gadget-container embedded">
        <h3>Scripts</h3>
        <div class="scope-info">scope: "embedded", scopeId: "scope-1"</div>
        <iframe
          src="https://apps.mypurecloud.de/crm-embeddable-desktop/component.html#/scripter?size=small&scope=embedded&scopeId=scope-1"
          width="100%"
          height="400"
        ></iframe>
      </div>

      <div class="gadget-container embedded">
        <h3>ACW</h3>
        <div class="scope-info">scope: "embedded", scopeId: "scope-2"</div>
        <iframe
          src="https://apps.mypurecloud.de/crm-embeddable-desktop/component.html#/acw?size=small&scope=embedded&scopeId=scope-2"
          width="100%"
          height="400"
        ></iframe>
      </div>
    </div>

    <script>
      // ============================================================
      // CONFIGURATION - Change these values for your integration
      // ============================================================
      const COMPONENT_ID = "OPA000003";
      const COMPONENT_NAME = "GENESYS_CLOUD_COMPOSABLE_DESKTOP";
      // ============================================================

      let broker;

      window.addEventListener("DOMContentLoaded", () => {
        broker = document.getElementById("broker").contentWindow;
        window.addEventListener("message", handleMessage);

        getStatus();
      });

      function handleMessage(event) {
        const message =
          typeof event.data === "string" ? JSON.parse(event.data) : event.data;
        const { type, data } = message;

        if (!type?.startsWith("Genesys.ComposableDesktop")) return;

        switch (type) {
          case "Genesys.ComposableDesktop.REGISTRATION_RESPONSE":
            console.log("[DEMO] Component registered successfully");
            break;
          case "Genesys.ComposableDesktop.STATUS_UPDATE":
            console.log("[DEMO] Status update received", data);

            if (
              data.contextId === "handshake" ||
              data.contextId === "initial"
            ) {
              register();
              console.log("[DEMO] Registration request sent after handshake");
              return;
            }

            break;
        }
      }

      function getStatus() {
        if (!validateConfig()) return;

        broker.postMessage(
          {
            type: "Genesys.ComposableDesktop.GET_STATUS",
            data: {
              componentId: COMPONENT_ID,
              contextId: "handshake",
            },
          },
          "*"
        );
      }

      function register() {
        if (!validateConfig()) return;

        broker.postMessage(
          {
            type: "Genesys.ComposableDesktop.REGISTRATION_REQUEST",
            data: {
              componentId: COMPONENT_ID,
              name: COMPONENT_NAME,
            },
          },
          "*"
        );
      }

      function setInteraction(scope, id) {
        if (!validateConfig()) return;

        const interactionId = document.getElementById("interactionId").value;

        if (!interactionId) {
          console.warn("[DEMO] ⚠️  Please enter an Interaction ID");
          return;
        }

        const data = {
          componentId: COMPONENT_ID,
          scope: scope,
          interactionId: interactionId,
        };

        if (id) {
          data.id = id;
        }

        broker.postMessage(
          {
            type: "Genesys.ComposableDesktop.SET_INTERACTION",
            data: data,
          },
          "*"
        );

        console.log("[DEMO] Setting interaction:", {
          scope,
          id,
          interactionId,
        });
      }

      function validateConfig() {
        const missing = [];
        if (!COMPONENT_ID) missing.push("COMPONENT_ID");
        if (!COMPONENT_NAME) missing.push("COMPONENT_NAME");

        if (missing.length > 0) {
          console.warn(`[DEMO] ⚠️  Please configure: ${missing.join(", ")}`);
          return false;
        }
        return true;
      }
    </script>
  </body>
</html>
