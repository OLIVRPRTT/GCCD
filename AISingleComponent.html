<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Genesys Composable Desktop - Single Component</title>
    <link rel="stylesheet" href="../shared/styles.css" />
  </head>
  <body>
    <main>
      <h1>Single Genesys component</h1>
      <p class="note">
        This page initializes the Composable Desktop broker, registers the host application,
        embeds one Genesys component, and sends an interaction ID to the default scope.
      </p>

      <section class="panel">
        <div class="grid">
          <label>
            Genesys apps origin
            <input id="origin" value="https://apps.mypurecloud.de" />
          </label>
          <label>
            Component ID
            <input id="componentId" value="paul-composable-demo" />
          </label>
          <label>
            Component name
            <input id="componentName" value="GENESYS_CLOUD_COMPOSABLE_DESKTOP" />
          </label>
          <label>
            Visible component
            <select id="component">
              <option value="copilot">Copilot</option>
              <option value="scripter">Scripts</option>
              <option value="acw">After Call Work</option>
            </select>
          </label>
          <label>
            Interaction ID
            <input id="interactionId" placeholder="A valid active conversation/interaction ID" />
          </label>
          <label>
            Locale
            <input id="locale" value="en" />
          </label>
        </div>

        <div class="actions">
          <button class="primary" id="start">1. Initialize</button>
          <button id="send" disabled>2. Send interaction</button>
          <button id="setLocale" disabled>Set locale</button>
          <span id="status" class="status" data-state="idle">Not initialized</span>
        </div>
      </section>

      <iframe id="broker" title="Genesys broker" hidden></iframe>

      <section class="panel">
        <h2>Embedded component</h2>
        <iframe id="componentFrame" class="component" title="Genesys component"></iframe>
      </section>

      <section class="panel">
        <h2>Message log</h2>
        <pre id="log" class="log">No messages yet.</pre>
      </section>
    </main>

    <script type="module">
      import { ComposableDesktopClient } from "../shared/composable-desktop.js";

      const elements = {
        origin: document.getElementById("origin"),
        componentId: document.getElementById("componentId"),
        componentName: document.getElementById("componentName"),
        component: document.getElementById("component"),
        interactionId: document.getElementById("interactionId"),
        locale: document.getElementById("locale"),
        start: document.getElementById("start"),
        send: document.getElementById("send"),
        setLocale: document.getElementById("setLocale"),
        status: document.getElementById("status"),
        broker: document.getElementById("broker"),
        componentFrame: document.getElementById("componentFrame"),
        log: document.getElementById("log"),
      };

      let client;
      const messages = [];

      function log(event) {
        messages.unshift(JSON.stringify(event, null, 2));
        elements.log.textContent = messages.slice(0, 30).join("\n\n");

        if (event.kind === "STATE") {
          elements.send.disabled = !event.payload.ready;
          elements.setLocale.disabled = !event.payload.ready;
          setStatus(
            event.payload.ready ? "Registered and authenticated" : "Waiting for registration/authentication...",
            event.payload.ready ? "ready" : "idle"
          );
        }
      }

      function setStatus(text, state) {
        elements.status.textContent = text;
        elements.status.dataset.state = state;
      }

      elements.start.addEventListener("click", async () => {
        try {
          elements.start.disabled = true;
          setStatus("Initializing...", "idle");

          client = new ComposableDesktopClient({
            brokerIframe: elements.broker,
            genesysOrigin: elements.origin.value,
            componentId: elements.componentId.value,
            componentName: elements.componentName.value,
            onEvent: log,
          });

          elements.componentFrame.src = client.componentUrl(elements.component.value, {
            scope: "default",
            size: "small",
          });

          await client.start();
          setStatus("Broker loaded; waiting for handshake...", "idle");
        } catch (error) {
          setStatus(error.message, "error");
          elements.start.disabled = false;
          console.error(error);
        }
      });

      elements.send.addEventListener("click", () => {
        try {
          client.setInteraction(elements.interactionId.value, { scope: "default" });
        } catch (error) {
          setStatus(error.message, "error");
        }
      });

      elements.setLocale.addEventListener("click", () => {
        try {
          client.setLocale(elements.locale.value);
        } catch (error) {
          setStatus(error.message, "error");
        }
      });
    </script>
  </body>
</html>
